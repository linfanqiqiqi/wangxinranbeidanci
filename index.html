<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猪猪然宝宝的听写软件</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;width:100%;max-width:620px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
h1{text-align:center;font-size:28px;font-weight:700;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.subtitle{text-align:center;color:rgba(255,255,255,0.3);font-size:13px;margin-bottom:25px;letter-spacing:2px}
.mode-tabs{display:flex;gap:10px;margin-bottom:20px}
.mode-tab{flex:1;padding:10px;text-align:center;border-radius:12px;background:rgba(255,255,255,0.05);cursor:pointer;transition:all 0.3s;font-size:14px;border:1px solid transparent}
.mode-tab.active{background:rgba(102,126,234,0.2);border-color:#667eea}
.panel{display:none}.panel.active{display:block}
textarea{width:100%;height:180px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:12px;color:#fff;padding:15px;font-size:14px;resize:vertical;font-family:inherit;line-height:1.6}
textarea::placeholder{color:rgba(255,255,255,0.2)}
.hint{font-size:13px;color:rgba(255,255,255,0.3);margin:8px 0}
.btn{padding:12px 30px;border-radius:12px;border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all 0.3s}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.3)}
.btn-secondary{background:rgba(255,255,255,0.1);color:#fff}
.btn-secondary:hover:not(:disabled){background:rgba(255,255,255,0.2)}
.btn-success{background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff}
.btn-warning{background:linear-gradient(135deg,#f2994a,#f2c94c);color:#fff}
.btn-danger{background:linear-gradient(135deg,#eb3349,#f45c43);color:#fff}
.word-count{font-size:13px;color:rgba(255,255,255,0.2);margin-top:10px}
.progress-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);transition:width 0.5s}
.word-display{text-align:center;margin:20px 0}
.word-display .word{font-size:48px;font-weight:700;letter-spacing:2px;min-height:60px;color:#667eea;visibility:hidden}
.word-display .word.show{visibility:visible}
.word-display .index{color:rgba(255,255,255,0.3);font-size:14px;margin-top:4px}
.play-area{text-align:center;margin:15px 0}
.btn-play{width:56px;height:56px;border-radius:50%;border:none;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-size:22px;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 25px rgba(102,126,234,0.3)}
.btn-play:hover{transform:scale(1.1)}.btn-play:disabled{opacity:0.5;cursor:not-allowed}
.info-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;margin:15px 0;display:none}
.info-box.active{display:block}
.info-box .word-en{font-size:20px;font-weight:600;margin-bottom:6px}
.info-box .word-cn{font-size:15px;color:rgba(255,255,255,0.6)}
.options{display:flex;gap:10px;margin:15px 0}
.options .btn{flex:1;padding:14px 8px;font-size:14px}
.options .btn.selected{transform:scale(0.95);opacity:0.7}
.examples{display:none;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:18px;margin:15px 0}
.examples.active{display:block}
.ex-item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.ex-item:last-child{border-bottom:none}
.ex-en{font-size:15px;line-height:1.6;color:#fff}
.ex-cn{font-size:13px;line-height:1.5;color:rgba(255,255,255,0.45);margin-top:3px}
.nav-row{display:flex;gap:10px;margin-top:15px}
.nav-row .btn{flex:1}
.result-summary{text-align:center}
.result-summary h2{font-size:24px;margin-bottom:15px}
.result-stats{display:flex;justify-content:center;gap:30px;margin:15px 0}
.stat-item{text-align:center}
.stat-item .num{font-size:32px;font-weight:700}
.stat-item .label{font-size:12px;color:rgba(255,255,255,0.3);margin-top:4px}
.stat-item .num.green{color:#38ef7d}.stat-item .num.yellow{color:#f2c94c}.stat-item .num.red{color:#f45c43}
.result-detail{margin:15px 0;max-height:200px;overflow-y:auto}
.result-word{display:flex;justify-content:space-between;padding:8px 12px;border-radius:8px;margin:4px 0;font-size:14px}
.result-word.clear{background:rgba(56,239,125,0.1)}
.result-word.vague{background:rgba(242,201,76,0.1)}
.result-word.forgot{background:rgba(244,92,67,0.1)}
@media(max-width:500px){.container{padding:20px}.options{flex-direction:column}}
</style>
</head>
<body>
<div class="container">
<h1>📖 猪猪然宝宝的听写软件</h1>
<div class="subtitle">听发音 · 辨单词 · 学例句</div>
<div class="mode-tabs">
<div class="mode-tab active" onclick="switchMode('manage')">📝 单词管理</div>
<div class="mode-tab" onclick="switchMode('dictate')">🎧 听写</div>
</div>

<div class="panel active" id="managePanel">
<textarea id="wordInput" placeholder="每行一个英文单词：&#10;abandon&#10;ability&#10;abroad"></textarea>
<div class="hint">💡 只输英文，自动补释义和例句（内置60词+在线检索）</div>
<div style="display:flex;gap:10px;margin-top:10px">
<button class="btn btn-primary" onclick="loadPreset()">📥 加载示例词库</button>
<button class="btn btn-success" onclick="saveWords()">🔍 检索并保存</button>
</div>
<div class="word-count" id="wordCount">已加载 0 个单词</div>
</div>

<div class="panel" id="dictatePanel">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="word-display">
<div class="word" id="currentWord">🔊</div>
<div class="index" id="wordIndex">第 0 / 0 个</div>
</div>
<div class="play-area">
<button class="btn-play" id="playBtn" onclick="playWord()">🔊</button>
<div style="font-size:12px;color:rgba(255,255,255,0.2);margin-top:6px;">点击播放 · 每词读两遍</div>
</div>

<div class="options">
<button class="btn btn-success" id="optClear" onclick="selectAnswer('clear')">✅ 非常清楚</button>
<button class="btn btn-warning" id="optVague" onclick="selectAnswer('vague')">🔶 模糊</button>
<button class="btn btn-danger" id="optForget" onclick="selectAnswer('forget')">❌ 不记得</button>
</div>

<div class="info-box" id="meaningBox">
<div class="word-en" id="meaningWord"></div>
<div class="word-cn" id="meaningCn"></div>
</div>

<div class="examples" id="exampleArea"><div id="exampleContent"></div></div>

<div class="nav-row">
<button class="btn btn-secondary" id="prevBtn" onclick="prevWord()" disabled>⬅ 上一个</button>
<button class="btn btn-primary" id="nextBtn" onclick="nextWord()">下一个 ➡</button>
</div>
<div class="nav-row" style="margin-top:6px">
<button class="btn btn-secondary" onclick="switchMode('manage')">⬅ 返回</button>
</div>
</div>

<div class="panel" id="resultPanel">
<div class="result-summary">
<h2>🎉 听写完成！</h2>
<div class="result-stats">
<div class="stat-item"><div class="num green" id="rClear">0</div><div class="label">清楚</div></div>
<div class="stat-item"><div class="num yellow" id="rVague">0</div><div class="label">模糊</div></div>
<div class="stat-item"><div class="num red" id="rForget">0</div><div class="label">忘记</div></div>
</div>
<div class="result-detail" id="resultDetail"></div>
<div style="display:flex;gap:10px">
<button class="btn btn-primary" onclick="restartWeak()">🔄 复习模糊/忘记的</button>
<button class="btn btn-secondary" onclick="switchMode('manage')">📝 管理单词</button>
</div>
</div>
</div>
</div>

<script>
// ═══ 内置词库（60词）：word → {cn:中文释义, en:英文释义, ex:[[英文例句,中文例句],...]}
const BI = {

"absence":{cn:"n. 缺席；不在",en:"the state of being away",ex:[["His absence from class was noticed by the teacher.","老师注意到了他的缺课。"],["In the absence of evidence, we cannot conclude.","没有证据，我们无法下结论。"]]},

"accurate":{cn:"adj. 准确的",en:"correct and without mistakes",ex:[["Provide accurate information in your resume.","简历中提供准确信息。"],["The forecast was accurate.","天气预报很准确。"]]},
"achieve":{cn:"v. 实现；达到",en:"to reach a goal through effort",ex:[["Work hard to achieve your goals.","努力实现你的目标。"],["The university achieved high rankings.","这所大学获得了高排名。"]]},
"acknowledge":{cn:"v. 承认；感谢",en:"to accept or admit the truth of something",ex:[["She acknowledged the help of her colleagues.","她感谢了同事的帮助。"],["He acknowledged his mistake.","他承认了自己的错误。"]]},

let words=[],results=[],cur=0,playing=false,answered=false;

function init(){
  const s=localStorage.getItem('dw');
  if(s)try{words=JSON.parse(s)}catch(e){loadPreset()}
  else loadPreset();
  updUI();
}
function loadPreset(){
  words=Object.entries(BI).map(([w,d])=>({word:w,cn:d.cn,en:d.en,ex:d.ex}));
  save();updUI();
}
async function saveWords(){
  const t=document.getElementById('wordInput').value.trim();
  if(!t){toast('请输入单词');return;}
  const raw=t.split('\n').map(l=>l.trim().toLowerCase()).filter(Boolean);
  toast('🔍 正在检索 '+raw.length+' 个单词...');
  const nw=[];
  for(const w of raw){
    if(BI[w]){nw.push({word:w,cn:BI[w].cn,en:BI[w].en,ex:BI[w].ex});continue;}
    try{
      const d=await fetchWDict(w);
      if(d)nw.push(d);else{nw.push({word:w,cn:'(未找到释义)',en:'',ex:[]});}
    }catch(e){nw.push({word:w,cn:'(检索失败)',en:'',ex:[]});}
  }
  words=nw;save();updUI();toast('✅ 已保存 '+words.length+' 个单词');
}
async function fetchWDict(word){
  try{
    const r=await fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word));
    if(!r.ok)return null;
    const j=await r.json();if(!j||!j[0])return null;
    const d=j[0];
    let en='',ex=[];
    if(d.meanings)for(const m of d.meanings)if(m.definitions)for(const def of m.definitions){
      if(!en)en=(m.partOfSpeech?m.partOfSpeech+'. ':'')+def.definition;
      if(def.example&&ex.length<2)ex.push([def.example,'']);
    }
    if(!en)en='(no definition)';
    // 翻译成中文（尝试多个翻译源）
    let cn='';
    // 源1: MyMemory (免费,支持跨域)
    try{
      const ac=new AbortController();setTimeout(()=>ac.abort(),3000);
      const tr=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(en.substring(0,200))+'&langpair=en|zh-CN',{signal:ac.signal});
      if(tr.ok){const tj=await tr.json();if(tj&&tj.responseData&&tj.responseData.translatedText)cn=tj.responseData.translatedText;}
    }catch(e){}
    // 源2: Google Translate (备选)
    if(!cn){try{
      const ac=new AbortController();setTimeout(()=>ac.abort(),3000);
      const tr=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q='+encodeURIComponent(en.substring(0,200)),{signal:ac.signal});
      if(tr.ok){const tj=await tr.json();if(tj&&tj[0])cn=tj[0].map(x=>x[0]).join('');}
    }catch(e){}}
    // 翻译例句
    for(let i=0;i<ex.length;i++){
      let cnex='';
      try{
        const ac=new AbortController();setTimeout(()=>ac.abort(),3000);
        const tr=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(ex[i][0].substring(0,200))+'&langpair=en|zh-CN',{signal:ac.signal});
        if(tr.ok){const tj=await tr.json();if(tj&&tj.responseData&&tj.responseData.translatedText)cnex=tj.responseData.translatedText;}
      }catch(e){}
      if(!cnex){try{
        const ac=new AbortController();setTimeout(()=>ac.abort(),3000);
        const tr=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=zh-CN&dt=t&q='+encodeURIComponent(ex[i][0].substring(0,200)),{signal:ac.signal});
        if(tr.ok){const tj=await tr.json();if(tj&&tj[0])cnex=tj[0].map(x=>x[0]).join('');}
      }catch(e){}}
      ex[i][1]=cnex||'(暂无中文翻译)';
    }
    return{word:d.word,cn:cn||'(中文翻译获取失败) '+en,en,ex};
  }catch(e){return null;}
}
function save(){localStorage.setItem('dw',JSON.stringify(words));}
function updUI(){
  document.getElementById('wordInput').value=words.map(w=>w.word).join('\n');
  document.getElementById('wordCount').textContent='已加载 '+words.length+' 个单词';
}
function switchMode(mode){
  document.querySelectorAll('.mode-tab').forEach((el,i)=>el.classList.toggle('active',(mode==='manage'&&i===0)||(mode==='dictate'&&i===1)));
  ['managePanel','dictatePanel','resultPanel'].forEach(id=>document.getElementById(id).classList.toggle('active',id.replace('Panel','')===mode));
  if(mode==='manage'){save();updUI();}
  if(mode==='dictate'){
    if(words.length===0){toast('请先添加单词');switchMode('manage');return;}
    startD();
  }
}
function startD(){
  cur=0;results=words.map(w=>({word:w.word,type:null}));answered=false;
  document.getElementById('resultPanel').classList.remove('active');
  document.getElementById('dictatePanel').classList.add('active');showWord();
}
function showWord(){
  const t=words.length;
  if(cur>=t){showR();return;}
  const w=words[cur];
  // 听写时隐藏单词，只显示图标
  document.getElementById('currentWord').textContent='🔊';
  document.getElementById('currentWord').classList.remove('show');
  document.getElementById('wordIndex').textContent='第 '+(cur+1)+' / '+t+' 个';
  document.getElementById('progressFill').style.width=((cur+1)/t*100)+'%';
  document.getElementById('meaningBox').classList.remove('active');
  document.getElementById('exampleArea').classList.remove('active');
  answered=!!results[cur].type;
  ['optClear','optVague','optForget'].forEach(id=>{document.getElementById(id).classList.remove('selected');document.getElementById(id).disabled=answered;});
  document.getElementById('prevBtn').disabled=(cur===0);
  document.getElementById('nextBtn').textContent=(cur===t-1)?'📊 查看结果':'下一个 ➡';
  if(answered){const ty=results[cur].type;hlOpt(ty);showContent(ty);}
  setTimeout(()=>playWord(),300);
}
function hlOpt(t){
  document.getElementById('optClear').classList.toggle('selected',t==='clear');
  document.getElementById('optVague').classList.toggle('selected',t==='vague');
  document.getElementById('optForget').classList.toggle('selected',t==='forget');
}
function playWord(){if(playing)return;const w=words[cur].word;speak(w,()=>{setTimeout(()=>speak(w),800);});}
function speak(text,cb){
  if(!window.speechSynthesis){if(cb)cb();return;}
  playing=true;document.getElementById('playBtn').disabled=true;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.8;
  const v=speechSynthesis.getVoices().find(v=>v.lang.startsWith('en')&&v.name.includes('US'))||speechSynthesis.getVoices().find(v=>v.lang.startsWith('en'));
  if(v)u.voice=v;
  u.onend=()=>{playing=false;document.getElementById('playBtn').disabled=false;if(cb)cb();};
  u.onerror=()=>{playing=false;document.getElementById('playBtn').disabled=false;if(cb)cb();};
  speechSynthesis.speak(u);
}
function selectAnswer(type){
  if(answered)return;
  results[cur].type=type;answered=true;hlOpt(type);
  ['optClear','optVague','optForget'].forEach(id=>document.getElementById(id).disabled=true);
  showContent(type);
}
function showContent(type){
  const w=words[cur];
  const mb=document.getElementById('meaningBox');
  const ea=document.getElementById('exampleArea');
  const ec=document.getElementById('exampleContent');

  // 显示单词拼写
  document.getElementById('currentWord').textContent=w.word;
  document.getElementById('currentWord').classList.add('show');

  if(type==='clear'){
    // 非常清楚：显示中文释义 + 例句
    document.getElementById('meaningWord').textContent=w.word;
    document.getElementById('meaningCn').textContent='📖 '+w.cn;
    mb.classList.add('active');
    let html='';
    if(w.ex&&w.ex[0])html+='<div class="ex-item"><div class="ex-en">💬 '+w.ex[0][0]+'</div>'+(w.ex[0][1]?'<div class="ex-cn">📖 '+w.ex[0][1]+'</div>':'')+'</div>';
    ec.innerHTML=html;ea.classList.add('active');
  }else if(type==='vague'){
    // 模糊：显示英文释义（帮回忆） + 例句
    document.getElementById('meaningWord').textContent=w.word;
    document.getElementById('meaningCn').textContent='💡 提示：'+w.en;
    mb.classList.add('active');
    let html='';
    if(w.ex&&w.ex[0])html+='<div class="ex-item"><div class="ex-en">💬 '+w.ex[0][0]+'</div>'+(w.ex[0][1]?'<div class="ex-cn">📖 '+w.ex[0][1]+'</div>':'')+'</div>';
    if(w.ex&&w.ex[1])html+='<div class="ex-item"><div class="ex-en">💬 '+w.ex[1][0]+'</div>'+(w.ex[1][1]?'<div class="ex-cn">📖 '+w.ex[1][1]+'</div>':'')+'</div>';
    ec.innerHTML=html;ea.classList.add('active');
  }else{
    // 不记得：同非常清楚，显示中文释义+例句
    document.getElementById('meaningWord').textContent=w.word;
    document.getElementById('meaningCn').textContent='📖 '+w.cn;
    mb.classList.add('active');
    let html='';
    if(w.ex&&w.ex[0])html+='<div class="ex-item"><div class="ex-en">💬 '+w.ex[0][0]+'</div>'+(w.ex[0][1]?'<div class="ex-cn">📖 '+w.ex[0][1]+'</div>':'')+'</div>';
    ec.innerHTML=html;ea.classList.add('active');
  }
}
function nextWord(){if(cur<words.length-1){cur++;showWord();}else showR();}
function prevWord(){if(cur>0){cur--;showWord();}}
function showR(){
  document.getElementById('dictatePanel').classList.remove('active');
  document.getElementById('resultPanel').classList.add('active');
  const c=results.filter(r=>r.type==='clear').length;
  const v=results.filter(r=>r.type==='vague').length;
  const f=results.filter(r=>r.type==='forget').length;
  document.getElementById('rClear').textContent=c;
  document.getElementById('rVague').textContent=v;
  document.getElementById('rForget').textContent=f;
  const map={clear:'✅ 清楚',vague:'🔶 模糊',forget:'❌ 忘记'},cls={clear:'clear',vague:'vague',forget:'forgot'};
  const wo=Object.fromEntries(words.map(w=>[w.word,w]));
  document.getElementById('resultDetail').innerHTML=results.map(r=>{
    const w=wo[r.word];
    return '<div class="result-word '+cls[r.type]+'"><span><strong>'+r.word+'</strong> '+(w?w.cn:'')+'</span><span>'+map[r.type]+'</span></div>';
  }).join('');
}
function restartWeak(){
  const w=words.filter((w,i)=>results[i]&&results[i].type!=='clear');
  if(w.length===0){toast('🎉 全部掌握！');return;}
  words=w;toast('🔄 复习 '+words.length+' 个单词');startD();
}
function toast(msg){
  const d=document.createElement('div');
  d.textContent=msg;
  d.style.cssText='position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;';
  document.body.appendChild(d);
  setTimeout(()=>{d.style.transition='0.3s';d.style.opacity='0';setTimeout(()=>d.remove(),300);},2000);
}
if(window.speechSynthesis){speechSynthesis.getVoices();speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices();}
init();
</script>
